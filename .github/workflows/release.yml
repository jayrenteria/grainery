name: release

on:
  push:
    tags:
      - 'app-v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust with macOS targets
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Rust
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release version
        run: node scripts/validate-release-version.mjs

      - name: Build and publish Tauri app
        # tauri-action currently publishes tags as action-vX.Y.Z, not v1.
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: Grainery v__VERSION__
          releaseBody: See the assets to download this version and install.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          tauriScript: npm run tauri
          args: ${{ matrix.args }}

      # AppImages bundle Ubuntu's GTK/WebKit libraries. Those libraries can be
      # incompatible with the host EGL stack on rolling distributions (for
      # example Arch/Omarchy), causing WebKitWebProcess to abort with
      # EGL_BAD_PARAMETER. Also publish the dynamically linked binary so those
      # systems can use their native WebKitGTK installation instead.
      - name: Publish system-linked Linux archive
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          archive="Grainery_${version}_linux-x86_64.tar.gz"
          mkdir -p release-archive/Grainery
          cp src-tauri/target/release/Grainery release-archive/Grainery/
          cp LICENSE release-archive/Grainery/
          tar -C release-archive -czf "$archive" Grainery
          gh release upload "app-v${version}" "$archive" --clobber
